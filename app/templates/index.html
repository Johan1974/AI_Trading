<!doctype html>
<!--
  Bestand: app/templates/index.html
  Relatief pad: ./app/templates/index.html
  Functie: Webportal UI voor voorspellingen en overzicht van bot-activiteiten.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Trading Bot Portal</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #0d1117;
        color: #e6edf3;
      }
      .container {
        max-width: 1000px;
        margin: 30px auto;
        padding: 0 16px;
      }
      .card {
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 10px;
        padding: 16px;
        margin-bottom: 16px;
      }
      input, button {
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #30363d;
        background: #0d1117;
        color: #e6edf3;
      }
      button {
        background: #238636;
        cursor: pointer;
      }
      .signal-buy { color: #3fb950; font-weight: bold; }
      .signal-sell { color: #f85149; font-weight: bold; }
      .signal-hold { color: #d29922; font-weight: bold; }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th, td {
        border-bottom: 1px solid #30363d;
        padding: 8px;
        text-align: left;
      }
      .small {
        opacity: 0.8;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h1>AI Trading Bot Portal</h1>
        <p class="small">Voorspellingen op basis van marktgeschiedenis + wereldnieuws sentiment.</p>
      </div>

      <div class="card">
        <label for="ticker">Ticker:</label>
        <input id="ticker" value="{{ default_ticker }}" />
        <button id="predictBtn">Genereer voorspelling</button>
      </div>

      <div class="card">
        <h2>Laatste voorspelling</h2>
        <pre id="prediction">Nog geen voorspelling uitgevoerd.</pre>
      </div>

      <div class="card">
        <h2>Activiteiten</h2>
        <table>
          <thead>
            <tr>
              <th>Tijd</th>
              <th>Ticker</th>
              <th>Signaal</th>
              <th>Expected Return %</th>
            </tr>
          </thead>
          <tbody id="eventsBody"></tbody>
        </table>
      </div>
    </div>

    <script>
      function signalClass(signal) {
        const s = (signal || "").toLowerCase();
        if (s === "buy") return "signal-buy";
        if (s === "sell") return "signal-sell";
        return "signal-hold";
      }

      async function runPrediction() {
        const ticker = document.getElementById("ticker").value || "AAPL";
        const res = await fetch(`/predict?ticker=${encodeURIComponent(ticker)}`);
        const data = await res.json();

        if (!res.ok) {
          document.getElementById("prediction").textContent = JSON.stringify(data, null, 2);
          return;
        }

        document.getElementById("prediction").innerHTML =
          `Ticker: ${data.ticker}\n` +
          `Latest Close: ${data.latest_close}\n` +
          `Predicted Next Close: ${data.predicted_next_close}\n` +
          `Expected Return %: ${data.expected_return_pct}\n` +
          `Signal: <span class="${signalClass(data.signal)}">${data.signal}</span>\n` +
          `News Sentiment: ${data.news_sentiment}\n` +
          `Generated At: ${data.generated_at}`;

        await refreshActivity();
      }

      async function refreshActivity() {
        const res = await fetch("/activity");
        const data = await res.json();
        const body = document.getElementById("eventsBody");
        body.innerHTML = "";
        for (const event of data.events || []) {
          const tr = document.createElement("tr");
          tr.innerHTML =
            `<td>${event.ts}</td>` +
            `<td>${event.ticker || "-"}</td>` +
            `<td class="${signalClass(event.signal)}">${event.signal || "-"}</td>` +
            `<td>${event.expected_return_pct ?? "-"}</td>`;
          body.appendChild(tr);
        }
      }

      document.getElementById("predictBtn").addEventListener("click", runPrediction);
      refreshActivity();
    </script>
  </body>
  </html>
