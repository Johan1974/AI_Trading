# Bestand: docker-compose.yml (Janitor-Standalone Edition)
# Gebruik uitsluitend: docker compose up -d

x-ai-trading-volumes: &ai-trading-volumes
  - ./storage:/app/storage
  - ./_logs_hub:/app/logs
  - ./artifacts:/app/artifacts
  - ./data:/app/data
  - ./app:/app/app
  - ./core:/app/core
  - ./agent:/app/agent
  - ./scripts:/app/scripts
  - /etc/localtime:/etc/localtime:ro
  - /etc/timezone:/etc/timezone:ro
  - /var/run/docker.sock:/var/run/docker.sock

services:
  worker:
    container_name: ai-trading-worker
    build:
      context: .
      dockerfile: Dockerfile.worker
    image: ai-trading-worker:latest
    restart: always
    deploy:
      resources:
        reservations:
          devices: [{driver: nvidia, count: 1, capabilities: [gpu]}]
    env_file:
      - docker-compose.env
      - ../.trading_vault
    networks:
      - ai_trading_net
    depends_on:
      redis: { condition: service_healthy }
    volumes: *ai-trading-volumes
    command: python -m app.worker_entry
    healthcheck:
      test: ["CMD", "python3", "-c", "import redis,os;r=redis.Redis.from_url(os.getenv('REDIS_URL','redis://redis:6379'));r.ping()"]
      interval: 30s
      start_period: 120s
    environment:
      TZ: Europe/Amsterdam

  trainer:
    container_name: ai-trading-trainer
    build:
      context: .
      dockerfile: Dockerfile.worker
    image: ai-trading-trainer:latest
    restart: always
    env_file:
      - docker-compose.env
      - ../.trading_vault
    networks:
      - ai_trading_net
    depends_on:
      redis: { condition: service_healthy }
      worker: { condition: service_started }
    volumes: *ai-trading-volumes
    command: python -m app.trainer_entry
    environment:
      TZ: Europe/Amsterdam

  portal:
    container_name: ai-trading-portal
    build:
      context: .
      dockerfile: Dockerfile.portal
    image: ai-trading-portal:latest
    restart: always
    ports:
      - "${HOST_PORT:-8000}:8000"
    env_file:
      - docker-compose.env
      - ../.trading_vault
    networks:
      - ai_trading_net
    depends_on:
      redis: { condition: service_healthy }
    volumes: *ai-trading-volumes
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      TZ: Europe/Amsterdam

  redis:
    image: redis:7-alpine
    container_name: ai-trading-redis
    restart: unless-stopped
    networks:
      - ai_trading_net
    volumes:
      - redis_data:/data
    environment:
      - TZ=Europe/Amsterdam
    command: >
      /bin/sh -c "apk add --no-cache tzdata &&
      cp /usr/share/zoneinfo/Europe/Amsterdam /etc/localtime &&
      redis-server --appendonly yes --save 60 1 --logfile ''"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s

  ollama:
    image: ollama/ollama:latest
    container_name: ai-trading-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    networks:
      - ai_trading_net
    volumes:
      - ollama_models:/root/.ollama
      - /usr/share/zoneinfo:/usr/share/zoneinfo:ro
      - /usr/share/zoneinfo/Europe/Amsterdam:/etc/localtime:ro
    deploy:
      resources:
        reservations:
          devices: [{driver: nvidia, count: 1, capabilities: [gpu]}]
    environment:
      - TZ=Europe/Amsterdam
      - OLLAMA_KEEP_ALIVE=24h
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s

  janitor:
    image: python:3.12-slim
    container_name: ai-trading-janitor
    restart: unless-stopped
    networks:
      - ai_trading_net
    depends_on:
      ollama: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - ./ollama_janitor:/app/ollama_janitor:ro
      - ./_logs_hub:/app/logs:ro
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      TZ: Europe/Amsterdam
      OLLAMA_HOST: http://ai-trading-ollama:11434
      VRAM_LIMIT_BYTES: "8053063680"
      JANITOR_INTERVAL: "30"
    working_dir: /app
    command: python3 ollama_janitor/janitor.py

  news: 
    container_name: ai-trading-news
    build:
      context: .
      dockerfile: Dockerfile.news
    image: ai-trading-news:latest
    restart: unless-stopped
    env_file:
      - docker-compose.env
      - ../.trading_vault
    networks:
      - ai_trading_net
    depends_on:
      redis: { condition: service_healthy }
    volumes: *ai-trading-volumes
    environment:
      AI_TRADING_PROCESS: news
      TZ: Europe/Amsterdam
      FINBERT_USE_CUDA: "0"
      TRANSFORMERS_CACHE: /app/data/hf_cache

networks:
  ai_trading_net:
    driver: bridge

volumes:
  redis_data:
  ollama_models: