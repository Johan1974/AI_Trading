# Bestand: docker-compose.yml (Final Audit-First Edition)
# Gebruikt: docker-compose.env (Publiek) + ../.trading_vault (Secrets)

x-ai-trading-volumes: &ai-trading-volumes
  - ./storage:/app/storage
  - ./_logs_hub:/app/logs
  - ./artifacts:/app/artifacts
  - ./data:/app/data
  - ./app:/app/app
  - ./core:/app/core
  - ./agent:/app/agent
  - ./scripts:/app/scripts
  - /etc/localtime:/etc/localtime:ro
  - /etc/timezone:/etc/timezone:ro
  - /:/hostfs:ro
  - /var/run/docker.sock:/var/run/docker.sock

services:
  worker:
    container_name: ai-trading-worker
    build:
      context: .
      dockerfile: Dockerfile.worker
    image: ai_trading-ai-trading-bot:latest
    restart: always
    deploy:
      resources:
        reservations:
          devices: [{driver: nvidia, count: 1, capabilities: [gpu]}]
    env_file:
      - docker-compose.env
      - ../.trading_vault
    networks:
      - ai_trading_net
    depends_on:
      redis: { condition: service_healthy }
    volumes: *ai-trading-volumes
    command: python -m app.worker_entry
    environment:
      AI_TRADING_PROCESS: worker
      TZ: Europe/Amsterdam
      GENESIS_REQUIRE_GPU: ${GENESIS_REQUIRE_GPU:-1}

  portal:
    container_name: ai-trading-portal
    build:
      context: .
      dockerfile: Dockerfile.portal
    image: ai_trading-ai-trading-portal:latest
    restart: always
    ports:
      - "${HOST_PORT:-8000}:8000"
    env_file:
      - docker-compose.env
      - ../.trading_vault
    networks:
      - ai_trading_net
    depends_on:
      redis: { condition: service_healthy }
      worker: { condition: service_started }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
    volumes: *ai-trading-volumes
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      AI_TRADING_PROCESS: portal
      TZ: Europe/Amsterdam
      PORTAL_GENESIS_REQUIRE_GPU: 0

  redis:
    image: redis:7-alpine
    container_name: ai-trading-redis
    restart: unless-stopped
    networks:
      - ai_trading_net
    volumes:
      - redis_data:/data
      - ./_logs_hub:/app/logs
    environment:
      - TZ=Europe/Amsterdam
    command: >
      /bin/sh -c "apk add --no-cache tzdata && 
      cp /usr/share/zoneinfo/Europe/Amsterdam /etc/localtime && 
      redis-server --appendonly yes --logfile /app/logs/redis.log"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s

  dashboard-validator:
    image: mcr.microsoft.com/playwright/python:v1.58.0-jammy
    container_name: ai-trading-dashboard-validator
    # AFGEDWONGEN: Root-permissies voor Docker socket manipulatie
    user: root
    shm_size: '2gb'
    restart: always
    env_file:
      - docker-compose.env
      - ../.trading_vault
    networks:
      - ai_trading_net
    volumes:
      - ./app:/app
      - ./_logs_hub:/app/logs
      - ./core:/app/core
      - ./requirements-validator.txt:/requirements-validator.txt:ro
      - /usr/share/zoneinfo/Europe/Amsterdam:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      sh -c "pip install -r /requirements-validator.txt && playwright install chromium && 
             python -u /app/tests/run_ui_tests.py"
    environment:
      - API_URL=http://portal:8000
      - TZ=Europe/Amsterdam
      - PYTHONUNBUFFERED=1
      - DEBUG_MODE=true
    depends_on:
      portal: { condition: service_healthy }

networks:
  ai_trading_net:
    driver: bridge

volumes:
  redis_data: