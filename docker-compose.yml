# Bestand: docker-compose.yml
# Relatief pad: ./docker-compose.yml
# Functie: Definieert de bot-service, buildconfig, poortmapping en runtime omgevingsvariabelen.
#
# Start/stop voor dagelijks gebruik: altijd ./run_bot.sh (root van deze repo).
# Dat laadt ~/.trading_vault, draait API health-checks en roept compose met het juiste -f pad aan.
# Alleen `docker compose up` is mogelijk maar dan mis je vault-export en het vaste compose-pad.
services:
  ai-trading-bot:
    build: .
    container_name: ai-trading-bot
    gpus: all
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
      - ./logs:/app/logs
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      TZ: Europe/Amsterdam
      CRYPTOCOMPARE_KEY: ${CRYPTOCOMPARE_KEY:-}
      SOCIAL_REFRESH_SEC: ${SOCIAL_REFRESH_SEC:-300}
      SOCIAL_HIGH_INTEREST_PCT: ${SOCIAL_HIGH_INTEREST_PCT:-300}
      COINMARKETCAP_KEY: ${COINMARKETCAP_KEY:-${CMC_API_KEY:-}}
      PAPER_START_BALANCE_EUR: ${PAPER_START_BALANCE_EUR:-10000}
      ENGINE_LOOP_MINUTES: ${ENGINE_LOOP_MINUTES:-1}
      RL_EPISODE_HOURS: ${RL_EPISODE_HOURS:-24}
      RL_EPISODE_TRAIN_STEPS: ${RL_EPISODE_TRAIN_STEPS:-3000}
      DEFAULT_TICKER: ${DEFAULT_TICKER:-BTC-EUR}
      TICKERS: ${TICKERS:-BTC-EUR,ETH-EUR,XRP-EUR,SOL-EUR}
      SCANNER_TOP_VOLUME: ${SCANNER_TOP_VOLUME:-30}
      SCANNER_TOP_VOLUME_POOL: ${SCANNER_TOP_VOLUME_POOL:-50}
      SCANNER_ELITE_COUNT: ${SCANNER_ELITE_COUNT:-8}
      SCANNER_MOVER_MIN_VOLUME_EUR: ${SCANNER_MOVER_MIN_VOLUME_EUR:-1000000}
      SCANNER_MIN_MARKET_CAP_EUR: ${SCANNER_MIN_MARKET_CAP_EUR:-500000000}
      SCANNER_INTERVAL_SEC: ${SCANNER_INTERVAL_SEC:-3600}
      LOOKBACK_DAYS: ${LOOKBACK_DAYS:-400}
      BITVAVO_KEY_READ: ${BITVAVO_KEY_READ:-}
      BITVAVO_SECRET_READ: ${BITVAVO_SECRET_READ:-}
      MIN_24H_VOLUME_EUR: ${MIN_24H_VOLUME_EUR:-500000}
      PAIR_MIN_QUOTE_BALANCE: ${PAIR_MIN_QUOTE_BALANCE:-50}
      PAIR_MIN_BASE_BALANCE: ${PAIR_MIN_BASE_BALANCE:-0.00001}
      # Risk engine (core/risk_manager.py): sizing, max position, harde SL/TP
      RISK_SIZING_MODE: ${RISK_SIZING_MODE:-fixed_eur}
      RISK_BASE_TRADE_EUR: ${RISK_BASE_TRADE_EUR:-100}
      RISK_MAX_TRADE_EQUITY_PCT: ${RISK_MAX_TRADE_EQUITY_PCT:-10}
      RISK_MAX_PER_ASSET_TRADE_PCT: ${RISK_MAX_PER_ASSET_TRADE_PCT:-20}
      RISK_MAX_POSITION_EQUITY_PCT: ${RISK_MAX_POSITION_EQUITY_PCT:-40}
      RISK_STOP_LOSS_PCT: ${RISK_STOP_LOSS_PCT:-2.5}
      RISK_TAKE_PROFIT_PCT: ${RISK_TAKE_PROFIT_PCT:-5.0}
      # Telegram: zet in ~/.trading_vault of export vóór `docker compose` (of .env naast compose)
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      PRIVATE_EMAIL: ${PRIVATE_EMAIL:-}
      PRIVATE_PASS: ${PRIVATE_PASS:-}
      PRIVATE_IMAP: ${PRIVATE_IMAP:-}
      PRIVATE_SMTP: ${PRIVATE_SMTP:-}
      PRIVATE_PORT: ${PRIVATE_PORT:-587}
      # GPU: in container standaard verplicht (/.dockerenv); zet op 0 voor CPU-only test.
      GENESIS_REQUIRE_GPU: ${GENESIS_REQUIRE_GPU:-1}
      # Heal-script: zet op 1 als je op CPU-log OK wilt (default 0 = alleen cuda:0).
      GENESIS_HEAL_ALLOW_CPU_LOG: ${GENESIS_HEAL_ALLOW_CPU_LOG:-0}
      # FinBERT op GPU zodra CUDA beschikbaar is (torch cu121 in Dockerfile).
      FINBERT_USE_CUDA: ${FINBERT_USE_CUDA:-1}
      # Overnight RL + paper: eerste flat positie seeden, lagere confidence-drempel, GPU-train-loop, metrics-DB.
      RL_SEED_FIRST_POSITION: ${RL_SEED_FIRST_POSITION:-1}
      RL_SEED_NOTIONAL_EUR: ${RL_SEED_NOTIONAL_EUR:-500}
      RL_ACTION_MIN_CONFIDENCE: ${RL_ACTION_MIN_CONFIDENCE:-0.75}
      RL_BACKGROUND_TRAIN: ${RL_BACKGROUND_TRAIN:-1}
      RL_TRAIN_CHUNK_STEPS: ${RL_TRAIN_CHUNK_STEPS:-1000}
      RL_PRIORITY_PAIR_TRAIN_MULT: ${RL_PRIORITY_PAIR_TRAIN_MULT:-1.65}
      RL_TRAIN_INTERVAL_SEC: ${RL_TRAIN_INTERVAL_SEC:-120}
      RL_MULTI_INFER_INTERVAL_SEC: ${RL_MULTI_INFER_INTERVAL_SEC:-60}
      RL_CHECKPOINT_INTERVAL_SEC: ${RL_CHECKPOINT_INTERVAL_SEC:-3600}
      RL_METRICS_DB_PATH: ${RL_METRICS_DB_PATH:-/app/storage/rl_training_metrics.sqlite}
      TRADE_HISTORY_DB_PATH: ${TRADE_HISTORY_DB_PATH:-/app/storage/trade_history.db}
      PAPER_BITVAVO_DB_PATH: ${PAPER_BITVAVO_DB_PATH:-/app/storage/paper_bitvavo.db}
      AI_TRADING_STORAGE_ROOT: ${AI_TRADING_STORAGE_ROOT:-/app/storage}
      RL_TRAINING_CHART_MAX_POINTS: ${RL_TRAINING_CHART_MAX_POINTS:-12000}
      # Zet op 1 voor console [DATA AUDIT] per paper/engine tick (rauwe RL-inputvector).
      RL_DATA_AUDIT_HEARTBEAT: ${RL_DATA_AUDIT_HEARTBEAT:-0}
